version: '3.8'

services:
  ai-orchestration:
    build: .
    container_name: ai-orchestration
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - LOG_LEVEL=info
      - MEMORY_COMPRESSION_THRESHOLD=100
      - CONTEXT_WINDOW_SIZE=30
      - ENABLE_TRANSFORMATION_TRACKING=true
      - ENABLE_QUALITY_LOOPS=true
      - ENABLE_MARKET_ADAPTATION=true
      - DEFAULT_SOPHISTICATION_LEVEL=3
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: ai-orchestration-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  postgres:
    image: postgres:15-alpine
    container_name: ai-orchestration-db
    environment:
      POSTGRES_DB: ai_orchestration
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    restart: unless-stopped

  pgvector:
    image: pgvector/pgvector:pg15
    container_name: ai-orchestration-vector
    environment:
      POSTGRES_DB: ai_orchestration_vectors
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - vector_data:/var/lib/postgresql/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: ai-orchestration-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - ai-orchestration
    restart: unless-stopped

volumes:
  postgres_data:
  vector_data:
  redis_data:

networks:
  default:
    name: ai-orchestration-network